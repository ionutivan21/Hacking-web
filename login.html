<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - EthicalHacking Academy</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔐 Log In</h1>
            <p class="tinkode-brand">TINKODE Security Platform</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Parolă:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn-submit">Autentificare</button>
            </form>
            
            <p class="auth-link">Nu ai cont? <a href="register.html">Înregistrează-te acum</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
