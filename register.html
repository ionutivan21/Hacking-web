<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EthicalHacking Academy</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>📝 Înregistrare</h1>
            <p class="tinkode-brand">TINKODE Security Platform</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="nume">Nume Complet:</label>
                    <input type="text" id="nume" name="nume" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Parolă:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirmare Parolă:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                
                <button type="submit" class="btn-submit">Înregistrare</button>
            </form>
            
            <p class="auth-link">Ai deja cont? <a href="login.html">Log In acum</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
